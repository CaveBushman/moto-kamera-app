unit_id: moto-1
startup:
  hardware_connect_delay_s: 3.0
video:
  device: 1
  width: 1920
  height: 1080
  fps: 30
  allow_macos_capture: false
ai:
  type: hailo
  model: /usr/share/hailo-models/yolov8s_h8.hef
  confidence: 0.35
  startup_delay_s: 5.0
  max_fps: 1.5
  max_input_width: 256
  infer_timeout_ms: 70
  performance_budget_pct: 10.0
  guard_inference_ms: 150
  guard_busy_ms: 300
  guard_util_pct: 35
  guard_cooldown_s: 15
  canary_max_inference_ms: 120
  canary_max_errors: 3
  canary_compare_dot: true
  canary_compare_log_interval_s: 1.0
  target_class: bicycle   # stock COCO model has no "cyclist" class; scripts/prepare_cyclist_hef.sh switches this to "cyclist"
  dot_min_area: 12
  dot_max_area_ratio: 0.08
  dot_box_pad: 22
  labels: null
  training_capture:
    enabled: false   # save operator-confirmed LOCKED tracking boxes as
                      # YOLO training data -- see docs/HAILO_CYCLIST_MODEL.md
    output_dir: data/training_capture
    interval_s: 2.0
    label: cyclist
    min_free_disk_mb: 500
tracking:
  algorithm: kcf
  max_input_width: 416
  csrt_slow_warn_ms: 60
  csrt_slow_disable_after: 4
  byte_min_hits: 1
gimbal:
  type: dji_rs4_pro
  connection: ble
  ble_name: DJI RS4 PRO-094PP0
  ble_address: 5B36F71C-E8C8-CA4B-5578-0774EB33DE88
  ble_service_uuid: null
  ble_tx_char_uuid: null
  ble_rx_char_uuid: null
  ble_velocity_timeout_s: 0.15
  ble_notify_stale_s: 10.0
  can_channel: can0
  can_bitrate: 1000000
  uart_device: /dev/ttyAMA0
  uart_baudrate: 115200
  max_pan_speed: 20
  max_tilt_speed: 12
camera:
  type: blackmagic_rest
  ip: 192.168.9.20
  port: 9993
  rest_port: 80
  use_tls: false
  verify_tls: false
  username: null
  password: null
  auth_token: null
gps:
  device: auto
  baudrate: 9600
encoder:
  enabled: false   # broadcast uplink from the bike -- Blackmagic Streaming
                    # Encoder HD/4K, separate device from the gimbal camera
  ip: 192.168.9.40
  port: 80
telemetry:
  control_room_url: ws://127.0.0.1:8765
preview_relay:
  fps: 5
  jpeg_quality: 55
  max_width: 960
audio:
  input_device: null
  output_device: null
display:
  ui_scale: 1.5
  controls_scale: 1.4
  preview_fps: 20
  preview_smooth_scaling: false
  fullscreen: true
  allow_macos_fullscreen: false
safety:
  ride_lock_enabled: false
  ride_lock_speed_kmh: 15
  # Finish-zone peel-off rule: 500 m mandatory per the federation's regs,
  # with a 1 km heads-up so the pilot has time to react. finish_lat/lon are
  # set from Settings (USE CURRENT POSITION or manual entry) or pushed by
  # the control room via stage_info -- null until set for the day's race.
  finish_warning_m: 1000
  finish_mandatory_m: 500
  finish_lat: null
  finish_lon: null
logging:
  dir: logs
_config_dir: /Users/david/Development/07 moto kamera app/config
